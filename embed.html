<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HQI Project Scores</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="embedBody">
    <main class="embedMain">
      <section class="embedShell">
        <section class="panel embedPanel">
          <div class="panelHead">
            <div>
              <h2>프로젝트별 품질 점수</h2>
              <p>정기 업데이트 표시</p>
            </div>
            <div class="embedMeta">
              <span>마지막 생성</span>
              <strong id="generatedAt">-</strong>
            </div>
            <div class="embedControls">
              <input id="search" type="search" placeholder="프로젝트 검색" />
              <button id="refreshButton" type="button" class="secondaryButton">수동 갱신</button>
            </div>
          </div>
          <div class="tableWrap">
            <table>
              <thead>
                <tr>
                  <th>프로젝트</th>
                  <th>HQI</th>
                  <th>TPR</th>
                  <th>DQS</th>
                  <th>BOR</th>
                  <th>BFR</th>
                  <th>TC</th>
                  <th>결함</th>
                  <th>상태</th>
                </tr>
              </thead>
              <tbody id="projectRows"></tbody>
            </table>
          </div>
          <div class="tableNote">
            <strong>약어 설명</strong>
            HQI는 <strong>Hanpass Quality Index</strong>로 프로젝트 종합 품질 점수입니다. TPR은 <strong>테스트 진행율</strong>, DQS는 <strong>결함 기반 지수</strong>, BOR는 <strong>결함 발생 비율</strong>, BFR은 <strong>결함 수정 비율</strong>, TC는 <strong>테스트 케이스 수</strong>를 뜻합니다.
          </div>
        </section>

        <section class="panel embedPanel">
          <div class="panelHead">
            <div>
              <h2>정기 업데이트 버전별 점수</h2>
              <p>정기 업데이트 버전 기준 HQI 추이</p>
            </div>
          </div>
          <div id="trendChart" class="embedTrendChart" aria-label="정기 업데이트 버전별 점수 그래프"></div>
        </section>
      </section>
    </main>

    <div id="toast" role="status"></div>
    <script src="/embed.js"></script>
  </body>
</html>
