<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HQI Project Scores - Embed 1</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f8;
        --surface: #ffffff;
        --ink: #17202a;
        --muted: #667085;
        --line: #d7dde3;
        --good: #047857;
        --warn: #b45309;
        --bad: #b91c1c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 8px;
        background: var(--bg);
        color: var(--ink);
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 13px;
      }

      main {
        display: grid;
        gap: 12px;
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 18px;
      }

      .head {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: flex-end;
        margin-bottom: 10px;
      }

      .sectionHead {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: center;
        margin-bottom: 10px;
      }

      .meta {
        display: grid;
        gap: 2px;
        text-align: right;
      }

      .meta span {
        color: var(--muted);
        font-size: 11px;
      }

      .meta strong {
        font-size: 14px;
        line-height: 1.2;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 25px;
        line-height: 1.2;
      }

      h2 {
        font-size: 17px;
        line-height: 1.2;
      }

      .subtle {
        margin-top: 4px;
        color: var(--muted);
        font-size: 13px;
      }

      .tableWrap {
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 6px;
      }

      table {
        width: 100%;
        min-width: 980px;
        border-collapse: collapse;
        background: #fff;
      }

      th,
      td {
        padding: 8px 10px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        white-space: nowrap;
      }

      th {
        background: #f0f3f5;
        color: #4b5563;
        font-size: 11px;
      }

      tbody tr:hover {
        background: #ecfdf5;
      }

      .score {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 52px;
        height: 24px;
        padding: 0 10px;
        border-radius: 999px;
        color: #fff;
        font-weight: 800;
      }

      .score.good {
        background: var(--good);
      }

      .score.warn {
        background: var(--warn);
      }

      .score.bad {
        background: var(--bad);
      }

      .metric {
        font-variant-numeric: tabular-nums;
      }

      .chartWrap {
        padding-top: 0;
      }

      .chart {
        display: block;
        width: 100%;
        height: auto;
      }

      .axisText,
      .label {
        fill: var(--muted);
        font-size: 10px;
      }

      .axis {
        stroke: #667085;
        stroke-width: 1.4;
      }

      .grid {
        stroke: #e4e8ed;
        stroke-width: 1;
      }

      .line {
        fill: none;
        stroke: var(--good);
        stroke-width: 3;
      }

      .point {
        fill: var(--good);
        stroke: #fff;
        stroke-width: 3;
      }

      .pointText {
        fill: var(--ink);
        font-size: 10px;
        font-weight: 800;
      }

      .legend {
        display: flex;
        gap: 14px;
        align-items: center;
        margin-top: 8px;
        color: var(--muted);
        font-size: 12px;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--good);
        display: inline-block;
        margin-right: 6px;
        vertical-align: -1px;
      }

      .toggleBtn {
        border: 1px solid var(--line);
        background: #f0f3f5;
        color: var(--ink);
        border-radius: 999px;
        padding: 7px 12px;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        white-space: nowrap;
      }

      .chartWrap[hidden] {
        display: none;
      }

      @media (max-width: 900px) {
        .head {
          align-items: stretch;
          flex-direction: column;
        }

        .sectionHead {
          align-items: stretch;
          flex-direction: column;
        }

        .meta {
          text-align: left;
        }
      }

    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <div class="head">
          <div>
            <h1>프로젝트별 품질 점수</h1>
            <p class="subtle">5.18~5.21 정기 업데이트만 표시</p>
          </div>
          <div class="meta">
            <span>마지막 생성</span>
            <strong id="generatedAt">-</strong>
          </div>
        </div>
        <div class="tableWrap">
          <table>
            <thead>
              <tr>
                <th>프로젝트</th>
                <th>HQI</th>
                <th title="테스트 수행 지수 - Test Progress Rate">TPR</th>
                <th title="결함 기반 지수 - Defect Quality Score">DQS</th>
                <th title="결함 발생 지수 (Bug Occurrence Ratio)">BOR</th>
                <th title="결함 수정 지수 (Bug Fix Ratio)">BFR</th>
                <th>TC</th>
                <th>결함</th>
                <th>상태</th>
              </tr>
            </thead>
            <tbody id="projectRows"></tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <div class="sectionHead">
          <div>
            <h2>정기 업데이트 버전별 점수 그래프</h2>
            <p class="subtle">5.18~5.21 HQI 추이</p>
          </div>
          <button id="trendToggle" class="toggleBtn" type="button" aria-expanded="false" aria-controls="trendWrap">펼치기</button>
        </div>
        <div id="trendWrap" class="chartWrap">
          <svg id="trendChart" class="chart" viewBox="0 0 860 240" role="img" aria-label="정기 업데이트 버전별 점수 그래프"></svg>
          <div class="legend"><span class="dot"></span>HQI 점수</div>
        </div>
      </section>
    </main>

    <script>
      const fmtPct = (value) => `${Math.round((value || 0) * 100)}%`;
      const fmtCases = (row) => (row.testCaseBase > 0 ? `${row.executedCases}/${row.testCaseBase}` : "미집계");
      const scoreClass = (score) => (score >= 85 ? "good" : score >= 70 ? "warn" : "bad");
      const normalizeStatus = (value) => {
        const text = String(value || "").trim().toLowerCase();
        if (!text) return "-";
        if (text.includes("완료") || text.includes("done")) return "완료";
        if (text.includes("진행")) return "진행 중";
        return value;
      };
      const escapeHtml = (value) =>
        String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      const trendWrap = document.getElementById("trendWrap");
      const trendToggle = document.getElementById("trendToggle");
      let trendCollapsed = true;

      function renderTrendToggle() {
        trendWrap.hidden = trendCollapsed;
        trendToggle.setAttribute("aria-expanded", String(!trendCollapsed));
        trendToggle.textContent = trendCollapsed ? "펼치기" : "접기";
      }

      const formatGeneratedAt = (value) => {
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return "-";
        const parts = new Intl.DateTimeFormat("sv-SE", {
          timeZone: "Asia/Seoul",
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: false,
        }).formatToParts(date);
        const lookup = Object.fromEntries(parts.filter((part) => part.type !== "literal").map((part) => [part.type, part.value]));
        return `${lookup.year}-${lookup.month}-${lookup.day} ${lookup.hour}:${lookup.minute}:${lookup.second}`;
      };

      function renderRows(rows) {
        document.getElementById("projectRows").innerHTML = rows.length
          ? rows
              .map(
                (row) => `
                  <tr>
                    <td>
                      <strong>${escapeHtml(row.project)}</strong><br />
                      <small>${escapeHtml(row.category)} · ${escapeHtml(row.date || "-")}</small>
                    </td>
                    <td><span class="score ${scoreClass(row.score)}">${row.score}</span></td>
                    <td class="metric">${fmtPct(row.TPR)}</td>
                    <td class="metric">${fmtPct(row.DQS)}</td>
                    <td class="metric">${fmtPct(row.BOR)}</td>
                    <td class="metric">${fmtPct(row.BFR)}</td>
                    <td class="metric">${fmtCases(row)}</td>
                    <td class="metric">${row.bugCount} / 미해결 ${row.openBugCount}</td>
                    <td>${escapeHtml(normalizeStatus(row.status))}</td>
                  </tr>
                `
              )
              .join("")
          : '<tr><td colspan="9">표시할 정기 업데이트 결과가 없습니다.</td></tr>';
      }

      function renderTrend(rows) {
        const svg = document.getElementById("trendChart");
        const width = 860;
        const height = 240;
        const pad = 28;
        const plotWidth = width - pad * 2;
        const plotHeight = height - pad * 2;
        const minScore = 0;
        const maxScore = 100;

        if (!rows.length) {
          svg.innerHTML = "";
          return;
        }

        const toX = (index) => pad + (index * plotWidth) / Math.max(1, rows.length - 1);
        const toY = (score) => height - pad - ((score - minScore) / (maxScore - minScore)) * plotHeight;
        const points = rows.map((row, index) => [toX(index), toY(row.score)]);
        const path = points
          .map(([x, y], index) => `${index === 0 ? "M" : "L"} ${x.toFixed(1)} ${y.toFixed(1)}`)
          .join(" ");

        const gridLines = [0, 20, 40, 60, 80, 100]
          .map((tick) => {
            const y = toY(tick);
            return `
              <line x1="${pad}" y1="${y}" x2="${width - pad}" y2="${y}" class="grid" />
              <text x="18" y="${y + 4}" class="axisText">${tick}</text>
            `;
          })
          .join("");

        const xLabels = rows
          .map((row, index) => {
            const x = toX(index);
            return `
              <text x="${x}" y="${height - 10}" text-anchor="middle" class="axisText">${escapeHtml(row.project)}</text>
              <circle cx="${x}" cy="${toY(row.score)}" r="6" class="point"></circle>
              <text x="${x}" y="${toY(row.score) - 14}" text-anchor="middle" class="pointText">${row.score}</text>
            `;
          })
          .join("");

        svg.innerHTML = `
          <rect x="${pad}" y="${pad}" width="${plotWidth}" height="${plotHeight}" fill="#f8fafc"></rect>
          ${gridLines}
          <line x1="${pad}" y1="${pad}" x2="${pad}" y2="${height - pad}" class="axis"></line>
          <line x1="${pad}" y1="${height - pad}" x2="${width - pad}" y2="${height - pad}" class="axis"></line>
          <path d="${path}" class="line"></path>
          ${xLabels}
        `;
      }

      async function loadDashboard() {
        const response = await fetch("./embed-data.json", { cache: "no-store" });
        if (!response.ok) {
          throw new Error("embed-data.json 조회 실패");
        }
        const data = await response.json();
        document.getElementById("generatedAt").textContent = formatGeneratedAt(data.generatedAt);
        renderRows(data.projects || []);
        renderTrend(data.regularTrend || []);
      }

      loadDashboard().catch((error) => {
        document.getElementById("projectRows").innerHTML = `<tr><td colspan="9">${escapeHtml(error.message)}</td></tr>`;
      });
      trendToggle.addEventListener("click", () => {
        trendCollapsed = !trendCollapsed;
        renderTrendToggle();
      });
      renderTrendToggle();
    </script>
  </body>
</html>
